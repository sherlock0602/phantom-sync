<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻影同步：歡樂跳躍版 🌱</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --primary-glow: #00f0ff;
            --success-glow: #00ff88;
            --fail-glow: #ff4444;
            --score-glow: #ffd700;
            --bg-glass: rgba(20, 25, 40, 0.7);
        }

        body { margin: 0; overflow: hidden; background-color: #0d0e15; font-family: 'Segoe UI', sans-serif; color: white; }
        .game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .input_video { display: none; }
        .output_canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .glass-panel {
            position: absolute; top: 20px; left: 20px; width: 340px; padding: 20px;
            background: var(--bg-glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); z-index: 10; transition: all 0.3s ease;
        }

        .ui-header { font-size: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary-glow); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;}
        .ui-label { font-size: 12px; color: #a0aec0; text-transform: uppercase; margin-bottom: 2px;}
        .ui-value { font-size: 24px; font-weight: bold; color: white; }

        .timer-bar-container { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .timer-bar { width: 100%; height: 100%; background: var(--primary-glow); box-shadow: 0 0 10px var(--primary-glow); transition: width 0.1s linear; }

        .sync-status { font-size: 18px; font-weight: bold; margin-top: 10px; text-align: center; transition: all 0.2s; }

        .float-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 90px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none; opacity: 0; z-index: 80;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .float-active { opacity: 1; transform: translate(-50%, -80%); }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.4s;
        }
        .hidden { opacity: 0; pointer-events: none; }

        .big-text { font-size: 64px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px var(--primary-glow); margin-bottom: 30px; text-align: center; line-height: 1.2;}
        
        .start-btn {
            padding: 15px 40px; font-size: 24px; color: white; background: transparent; border: 2px solid var(--primary-glow); border-radius: 40px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .start-btn:hover { background: var(--primary-glow); color: #0d0e15; box-shadow: 0 0 30px var(--primary-glow); }
        .start-btn:active { transform: scale(0.95); }

        .system-start-flash { animation: flash 0.5s ease-out forwards; }
        @keyframes flash { 0% { background: rgba(0, 240, 255, 0.8); } 100% { background: rgba(0, 0, 0, 0); } }
    </style>
</head>
<body>

<div class="game-container">
    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>
    
    <div id="flash-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:90; pointer-events:none;"></div>
    <div class="float-text" id="float-text">PERFECT!</div>

    <div class="glass-panel" id="game-ui">
        <div class="ui-header"><span>🌱</span> 躲貓貓大挑戰</div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <div class="ui-label">STAGE</div>
                <div class="ui-value"><span id="stage-num">1</span>/<span id="max-stage-num">5</span></div>
            </div>
            <div style="text-align: center;">
                <div class="ui-label">SCORE</div>
                <div class="ui-value" id="score-text" style="color: var(--score-glow); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); font-size: 32px;">0</div>
            </div>
            <div style="text-align: right;">
                <div class="ui-label">TIME LIMIT</div>
                <div class="ui-value" id="timer-text">6.0s</div>
            </div>
        </div>
        
        <div class="timer-bar-container"><div class="timer-bar" id="timer-bar"></div></div>
        
        <div class="ui-label" style="margin-top:15px;">TARGET POSE</div>
        <div class="sync-status" id="pose-name" style="color: #00f0ff; font-size: 18px;">--</div>
        
        <div class="ui-label" style="margin-top:10px;">LIVE STATUS</div>
        <div class="sync-status" id="sync-status">等待連接...</div>
    </div>

    <div class="overlay" id="start-overlay">
        <div class="big-text">PHANTOM SYNC<br><span style="font-size: 24px; color: #00ff88;">跳躍躲貓貓模式</span></div>
        <button class="start-btn" onclick="startGame()">LINK START</button>
    </div>

    <div class="overlay hidden" id="result-overlay">
        <div class="big-text" id="result-text">TRAINING COMPLETE</div>
        <button class="start-btn" onclick="startGame()">PLAY AGAIN</button>
    </div>
</div>

<script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const uiPanel = document.getElementById('game-ui');
    const timerText = document.getElementById('timer-text');
    const timerBar = document.getElementById('timer-bar');
    const syncStatus = document.getElementById('sync-status');
    const poseNameDisplay = document.getElementById('pose-name');
    const stageNumText = document.getElementById('stage-num');
    const scoreText = document.getElementById('score-text');
    const floatText = document.getElementById('float-text');
    
    const startOverlay = document.getElementById('start-overlay');
    const resultOverlay = document.getElementById('result-overlay');
    const flashLayer = document.getElementById('flash-layer');

    const MAX_STAGES = 5;
    let totalScore = 0;
    let currentStage = 1;
    let isGameRunning = false;
    let isTransitioning = false;
    let timeLeft = 6000; 
    let timerInterval;

    // 🌟 全新動作庫設計：保證有手有腳，加入跳躍，且絕對不貼齊底部！
    // 參數說明：lh(左手), rh(右手), lf(左腳), rf(右腳) 
    // r 是感應泡泡的半徑 (寬容度高達 80)
    // 腳步(lf, rf) 的 Y 軸設定得比較小，保證整個動作浮在半空中！
    const poses = [
        {
            name: "大字空中跳 🌟",
            zones: {
                lh: {x: -160, y: -120, r: 80, id: 15},
                rh: {x: 160, y: -120, r: 80, id: 16},
                lf: {x: -120, y: 120, r: 80, id: 27},
                rf: {x: 120, y: 120, r: 80, id: 28}
            }
        },
        {
            name: "超級瑪利歐 🍄",
            zones: {
                lh: {x: -100, y: -160, r: 80, id: 15}, // 左手往上衝
                rh: {x: 120, y: 0, r: 80, id: 16},     // 右手擺旁邊
                lf: {x: -60, y: 140, r: 80, id: 27},   // 左腳直放
                rf: {x: 100, y: 20, r: 80, id: 28}     // 右腳大彎曲跳躍！
            }
        },
        {
            name: "水母縮球跳 🪼",
            zones: {
                lh: {x: -60, y: -20, r: 80, id: 15}, // 雙手夾緊
                rh: {x: 60, y: -20, r: 80, id: 16},
                lf: {x: -50, y: 60, r: 80, id: 27},  // 雙腳縮起來跳
                rf: {x: 50, y: 60, r: 80, id: 28}
            }
        },
        {
            name: "啦啦隊側飛 🎀",
            zones: {
                lh: {x: -140, y: -100, r: 80, id: 15}, // 手往左上
                rh: {x: -60, y: -140, r: 80, id: 16},
                lf: {x: 80, y: 40, r: 80, id: 27},     // 腳往右邊縮
                rf: {x: 160, y: 40, r: 80, id: 28}
            }
        },
        {
            name: "殭屍前跳 🧟",
            zones: {
                lh: {x: -80, y: -40, r: 80, id: 15}, // 雙手平舉
                rh: {x: 80, y: -40, r: 80, id: 16},
                lf: {x: -40, y: 80, r: 80, id: 27},  // 雙腳併攏跳
                rf: {x: 40, y: 80, r: 80, id: 28}
            }
        }
    ];

    let currentPoseData = null;
    // 記錄四個肢體的命中狀態
    let currentHitStatus = { lh: false, rh: false, lf: false, rf: false };

    function startGame() {
        flashLayer.classList.remove('system-start-flash'); void flashLayer.offsetWidth; flashLayer.classList.add('system-start-flash');
        startOverlay.classList.add('hidden'); resultOverlay.classList.add('hidden');
        totalScore = 0; currentStage = 1; updateScoreUI();
        loadStage(currentStage);
    }

    function updateScoreUI() { scoreText.innerText = totalScore; }

    function loadStage(stage) {
        isGameRunning = false; isTransitioning = true; 
        stageNumText.innerText = stage; timeLeft = 6000; updateTimerUI();
        
        currentPoseData = poses[Math.floor(Math.random() * poses.length)];
        poseNameDisplay.innerText = currentPoseData.name;
        
        // 狀態重置
        currentHitStatus = { lh: false, rh: false, lf: false, rf: false };
        syncStatus.innerText = "把手腳塞進泡泡裡！";
        syncStatus.style.color = "white";
        uiPanel.style.borderColor = "rgba(255, 255, 255, 0.1)";
        uiPanel.style.boxShadow = "0 8px 32px rgba(0, 0, 0, 0.5)";
        
        setTimeout(() => { isTransitioning = false; isGameRunning = true; startTimer(); }, 1500); 
    }

    function startTimer() {
        clearInterval(timerInterval);
        const startTime = Date.now();
        const totalDuration = timeLeft;
        timerInterval = setInterval(() => {
            if(!isGameRunning) return;
            const elapsed = Date.now() - startTime;
            timeLeft = totalDuration - elapsed;
            if (timeLeft <= 0) { timeLeft = 0; handleStageResult(false); }
            updateTimerUI();
        }, 50); 
    }

    function updateTimerUI() {
        timerText.innerText = (timeLeft / 1000).toFixed(1) + 's';
        const percentage = (timeLeft / 6000) * 100;
        timerBar.style.width = percentage + '%';
        timerBar.style.background = timeLeft < 2000 ? "var(--fail-glow)" : "var(--primary-glow)";
        timerBar.style.boxShadow = timeLeft < 2000 ? "0 0 10px var(--fail-glow)" : "0 0 10px var(--primary-glow)";
    }

    function handleStageResult(isSuccess) {
        isGameRunning = false; isTransitioning = true; clearInterval(timerInterval);
        if (isSuccess) {
            totalScore += 100;
            showFloatText("PERFECT!", "var(--success-glow)");
            uiPanel.style.borderColor = "var(--success-glow)";
            uiPanel.style.boxShadow = "0 0 30px var(--success-glow)";
            syncStatus.innerText = "全部命中！";
            syncStatus.style.color = "var(--success-glow)";
        } else {
            totalScore -= 50;
            showFloatText("TIME OUT", "var(--fail-glow)");
            uiPanel.style.borderColor = "var(--fail-glow)";
        }
        updateScoreUI();
        if (currentStage >= MAX_STAGES) {
            setTimeout(showFinalResult, 1000);
        } else {
            currentStage++; setTimeout(() => loadStage(currentStage), 800); 
        }
    }

    function showFloatText(msg, color) {
        floatText.innerText = msg; floatText.style.color = color; floatText.style.textShadow = `0 0 40px ${color}`;
        floatText.classList.remove('float-active'); void floatText.offsetWidth; floatText.classList.add('float-active');
        setTimeout(() => floatText.classList.remove('float-active'), 800);
    }

    function showFinalResult() {
        resultOverlay.classList.remove('hidden');
        let rank = totalScore === MAX_STAGES * 100 ? "<span style='color:#ffd700'>S 級：跳躍精靈！</span>" :
                   totalScore > 0 ? "<span style='color:#00ff88'>A 級：身手矯健！</span>" :
                   "<span style='color:#ff4444'>C 級：多跳幾次啦！</span>";
        document.getElementById('result-text').innerHTML = `TRAINING COMPLETE<br><br><span style="font-size: 32px; color: #a0aec0;">最終得分</span><br><span style="font-size: 80px; color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.8);">${totalScore}</span><br><br><span style="font-size: 24px;">${rank}</span>`;
    }

    // 🌟 全新超直覺【實體人形剪影】渲染
    function drawSolidSilhouette(ctx, cx, cy, poseData, hitStatus) {
        if (!poseData) return;
        ctx.save();
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        
        let allHit = hitStatus.lh && hitStatus.rh && hitStatus.lf && hitStatus.rf;
        const bodyColor = allHit ? 'rgba(0, 255, 136, 0.4)' : 'rgba(0, 240, 255, 0.4)';
        
        ctx.shadowColor = allHit ? '#00ff88' : '#00f0ff';
        ctx.shadowBlur = 20;

        // 畫出「超粗壯」的人體主幹
        ctx.beginPath();
        ctx.arc(cx, cy - 80, 50, 0, Math.PI*2); // 頭
        ctx.moveTo(cx, cy - 30); ctx.lineTo(cx, cy + 50); // 身體
        ctx.moveTo(cx, cy - 30); ctx.lineTo(cx + poseData.zones.lh.x, cy + poseData.zones.lh.y); // 左手
        ctx.moveTo(cx, cy - 30); ctx.lineTo(cx + poseData.zones.rh.x, cy + poseData.zones.rh.y); // 右手
        ctx.moveTo(cx, cy + 50); ctx.lineTo(cx + poseData.zones.lf.x, cy + poseData.zones.lf.y); // 左腳
        ctx.moveTo(cx, cy + 50); ctx.lineTo(cx + poseData.zones.rf.x, cy + poseData.zones.rf.y); // 右腳
        
        ctx.lineWidth = 120; // 這是真的有厚度的人形！
        ctx.strokeStyle = bodyColor;
        ctx.stroke();

        // 中間畫白線骨架輔助
        ctx.lineWidth = 10;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.stroke();

        // 🌟 畫出四個肢體的「判定泡泡」
        // 當肢體伸進去時，該泡泡會單獨亮起綠燈！
        const keys = ['lh', 'rh', 'lf', 'rf'];
        keys.forEach(k => {
            const z = poseData.zones[k];
            const isHit = hitStatus[k];
            ctx.beginPath();
            ctx.arc(cx + z.x, cy + z.y, z.r, 0, Math.PI*2);
            ctx.fillStyle = isHit ? 'rgba(0, 255, 136, 0.6)' : 'rgba(255, 255, 0, 0.2)';
            ctx.fill();
            
            ctx.lineWidth = 4;
            ctx.strokeStyle = isHit ? '#00ff88' : '#ffff00';
            ctx.setLineDash([10, 10]);
            ctx.stroke();
            ctx.setLineDash([]);
        });

        ctx.restore();
    }

    // 🌟 單獨判定四個肢體
    function updateHitStatus(landmarks, poseData, cx, cy, w, h) {
        if (!poseData || !landmarks) return { lh: false, rh: false, lf: false, rf: false };
        let status = { lh: false, rh: false, lf: false, rf: false };
        
        const keys = ['lh', 'rh', 'lf', 'rf'];
        keys.forEach(k => {
            const z = poseData.zones[k];
            const lm = landmarks[z.id];
            if (lm) {
                const px = lm.x * w; 
                const py = lm.y * h;
                const dist = Math.hypot(px - (cx + z.x), py - (cy + z.y));
                if (dist <= z.r) {
                    status[k] = true; // 只要進入這顆泡泡的半徑內就算命中！
                }
            }
        });
        return status;
    }

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        const w = canvasElement.width;
        const h = canvasElement.height;
        const cx = w / 2;
        
        // 🌟 【解決平板視角問題】：將整個剪影的重心大幅往上提！
        // 把 cy 改成 h / 2 - 50，這樣即使腳往下伸，也不會超出螢幕下緣
        const cy = h / 2 - 50; 

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, w, h);
        canvasCtx.drawImage(results.image, 0, 0, w, h);

        if (results.poseLandmarks && isGameRunning && !isTransitioning) {
            // 更新四個點的命中狀態
            currentHitStatus = updateHitStatus(results.poseLandmarks, currentPoseData, cx, cy, w, h);
            
            // 只要四個點都是 true (綠燈)，立刻過關！
            let allHit = currentHitStatus.lh && currentHitStatus.rh && currentHitStatus.lf && currentHitStatus.rf;
            if (allHit) {
                handleStageResult(true); 
            }
        }

        if (currentPoseData) {
            drawSolidSilhouette(canvasCtx, cx, cy, currentPoseData, currentHitStatus);
        }

        if (results.poseLandmarks) {
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255, 255, 255, 0.3)', lineWidth: 3});
            drawLandmarks(canvasCtx, results.poseLandmarks, {color: 'white', fillColor: '#00f0ff', lineWidth: 1, radius: 4});
        }
        canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>

</body>
</html>
