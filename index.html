<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻影同步：經典姿態覺醒 (完美視覺對應版) 🌱</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --primary-glow: #00f0ff;
            --success-glow: #00ff88;
            --fail-glow: #ff4444;
            --score-glow: #ffd700;
            --bg-glass: rgba(20, 25, 40, 0.7);
        }

        body { margin: 0; overflow: hidden; background-color: #0d0e15; font-family: 'Segoe UI', sans-serif; color: white; }
        .game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .input_video { display: none; }
        .output_canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .glass-panel {
            position: absolute; top: 20px; left: 20px; width: 340px; padding: 20px;
            background: var(--bg-glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); z-index: 10; transition: all 0.3s ease;
        }

        .ui-header { font-size: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary-glow); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;}
        .ui-label { font-size: 12px; color: #a0aec0; text-transform: uppercase; margin-bottom: 2px;}
        .ui-value { font-size: 24px; font-weight: bold; color: white; }

        .timer-bar-container { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .timer-bar { width: 100%; height: 100%; background: var(--primary-glow); box-shadow: 0 0 10px var(--primary-glow); transition: width 0.1s linear; }

        .sync-status { font-size: 18px; font-weight: bold; margin-top: 10px; text-align: center; transition: all 0.2s; }

        .float-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 90px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none; opacity: 0; z-index: 80;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .float-active { opacity: 1; transform: translate(-50%, -80%); }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.4s;
        }
        .hidden { opacity: 0; pointer-events: none; }

        .big-text { font-size: 64px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px var(--primary-glow); margin-bottom: 30px; text-align: center; line-height: 1.2;}
        
        .start-btn {
            padding: 15px 40px; font-size: 24px; color: white; background: transparent; border: 2px solid var(--primary-glow); border-radius: 40px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .start-btn:hover { background: var(--primary-glow); color: #0d0e15; box-shadow: 0 0 30px var(--primary-glow); }
        .start-btn:active { transform: scale(0.95); }

        .system-start-flash { animation: flash 0.5s ease-out forwards; }
        @keyframes flash { 0% { background: rgba(0, 240, 255, 0.8); } 100% { background: rgba(0, 0, 0, 0); } }
    </style>
</head>
<body>

<div class="game-container">
    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>
    
    <div id="flash-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:90; pointer-events:none;"></div>
    <div class="float-text" id="float-text">PERFECT!</div>

    <div class="glass-panel" id="game-ui">
        <div class="ui-header"><span>🌱</span> SYNC AVATAR</div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <div class="ui-label">STAGE</div>
                <div class="ui-value"><span id="stage-num">1</span>/<span id="max-stage-num">10</span></div>
            </div>
            <div style="text-align: center;">
                <div class="ui-label">SCORE</div>
                <div class="ui-value" id="score-text" style="color: var(--score-glow); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); font-size: 32px;">0</div>
            </div>
            <div style="text-align: right;">
                <div class="ui-label">TIME LIMIT</div>
                <div class="ui-value" id="timer-text">6.0s</div>
            </div>
        </div>
        
        <div class="timer-bar-container"><div class="timer-bar" id="timer-bar"></div></div>
        
        <div class="ui-label" style="margin-top:15px;">TARGET POSE</div>
        <div class="sync-status" id="pose-name" style="color: #00f0ff; font-size: 18px;">--</div>
        
        <div class="ui-label" style="margin-top:10px;">LIVE STATUS</div>
        <div class="sync-status" id="sync-status">等待連接...</div>
    </div>

    <div class="overlay" id="start-overlay">
        <div class="big-text">PHANTOM SYNC<br><span style="font-size: 24px; color: #00ff88;">經典姿態覺醒 (視覺完美版)</span></div>
        <button class="start-btn" onclick="startGame()">LINK START</button>
    </div>

    <div class="overlay hidden" id="result-overlay">
        <div class="big-text" id="result-text">TRAINING COMPLETE</div>
        <button class="start-btn" onclick="startGame()">PLAY AGAIN</button>
    </div>
</div>

<script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const uiPanel = document.getElementById('game-ui');
    const timerText = document.getElementById('timer-text');
    const timerBar = document.getElementById('timer-bar');
    const syncStatus = document.getElementById('sync-status');
    const poseNameDisplay = document.getElementById('pose-name');
    const stageNumText = document.getElementById('stage-num');
    const scoreText = document.getElementById('score-text');
    const floatText = document.getElementById('float-text');
    
    const startOverlay = document.getElementById('start-overlay');
    const resultOverlay = document.getElementById('result-overlay');
    const flashLayer = document.getElementById('flash-layer');

    const MAX_STAGES = 10; 
    let totalScore = 0;
    let currentStage = 1;
    let isGameRunning = false;
    let isTransitioning = false;
    let timeLeft = 6000; 
    let timerInterval;

// 🌟 最穩定的「相對關節判斷法 (動態比例升級版)」
    const poses = [
        { name: "V-Shape (高舉雙手)", check: (lm) => lm[15].y < lm[11].y && lm[16].y < lm[12].y && lm[15].y < lm[13].y && lm[16].y < lm[14].y },
        { name: "T-Pose (平舉雙手)", check: (lm) => Math.abs(lm[15].y - lm[11].y) < 0.15 && Math.abs(lm[16].y - lm[12].y) < 0.15 },
        // 🌟 修復核心：單手高舉！不分左右，只要一手高過鼻子，另一手低於肩膀就過關！
        { name: "單手高舉 (Raise One Hand)", check: (lm) => (lm[15].y < lm[0].y && lm[16].y > lm[12].y) || (lm[16].y < lm[0].y && lm[15].y > lm[11].y) },
        
        // 交叉防禦：雙手距離小於「肩膀寬度的 80%」
        { name: "交叉防禦 (Wakanda!)", check: (lm) => Math.abs(lm[15].x - lm[16].x) < Math.abs(lm[11].x - lm[12].x) * 0.8 && lm[15].y > lm[0].y && lm[15].y < lm[23].y },
        
        // 雙手抱頭：雙手都在鼻子上方，且雙手的 X 軸非常靠近頭部中心
        { name: "雙手抱頭 (絕對防禦)", check: (lm) => lm[15].y < lm[0].y && lm[16].y < lm[0].y && Math.abs(lm[15].x - lm[0].x) < Math.abs(lm[11].x - lm[12].x) && Math.abs(lm[16].x - lm[0].x) < Math.abs(lm[11].x - lm[12].x) },
        
        // 雙手叉腰：手肘寬度大於「肩膀寬度的 1.5 倍」，且手腕在骨盆附近
        { name: "雙手叉腰 (霸氣宣告)", check: (lm) => Math.abs(lm[15].y - lm[23].y) < 0.15 && Math.abs(lm[16].y - lm[24].y) < 0.15 && Math.abs(lm[13].x - lm[14].x) > Math.abs(lm[11].x - lm[12].x) * 1.5 },
        
        { name: "投降姿勢 (Stick 'em up)", check: (lm) => Math.abs(lm[13].y - lm[11].y) < 0.15 && Math.abs(lm[14].y - lm[12].y) < 0.15 && lm[15].y < lm[13].y && lm[16].y < lm[14].y },
        { name: "殭屍平舉 (道長來了)", check: (lm) => Math.abs(lm[15].y - lm[11].y) < 0.15 && Math.abs(lm[16].y - lm[12].y) < 0.15 && Math.abs(lm[15].y - lm[13].y) < 0.1 && Math.abs(lm[16].y - lm[14].y) < 0.1 },
        { name: "週末夜狂熱 (Disco Time)", check: (lm) => (lm[15].y < lm[0].y && lm[16].y > lm[24].y) || (lm[16].y < lm[0].y && lm[15].y > lm[23].y) },
        
        // 芭蕾圓環：雙手在頭頂上，且雙手距離小於「肩寬的 80%」
        { name: "芭蕾圓環 (天鵝湖)", check: (lm) => lm[15].y < lm[0].y && lm[16].y < lm[0].y && Math.abs(lm[15].x - lm[16].x) < Math.abs(lm[11].x - lm[12].x) * 0.8 },
        
        // 龜派氣功：雙手在胸前，距離小於「肩寬的 50%」
        { name: "龜派氣功 (能量蓄力)", check: (lm) => Math.abs(lm[15].x - lm[16].x) < Math.abs(lm[11].x - lm[12].x) * 0.5 && Math.abs(lm[15].y - lm[16].y) < 0.1 && lm[15].y > lm[11].y && lm[15].y < lm[23].y },
        
        // 🌟 修復核心：大字爆！雙手距離 > 肩寬2倍，雙腳距離 > 骨盆寬度 1.5 倍
        { name: "大字爆 (Starfish)", check: (lm) => lm[15].y < lm[11].y && lm[16].y < lm[12].y && Math.abs(lm[15].x - lm[16].x) > Math.abs(lm[11].x - lm[12].x) * 2 && Math.abs(lm[27].x - lm[28].x) > Math.abs(lm[23].x - lm[24].x) * 1.5 },
        
        { name: "神聖祈禱 (Pray)", check: (lm) => Math.abs(lm[15].x - lm[16].x) < 0.05 && lm[15].y > lm[0].y && Math.abs(lm[15].y - lm[11].y) < 0.15 },
        
        // 健美先生：手肘撐開(大於肩寬 1.5倍)，手腕低於手肘
        { name: "健美先生 (Muscle Flex)", check: (lm) => Math.abs(lm[13].x - lm[14].x) > Math.abs(lm[11].x - lm[12].x) * 1.5 && lm[15].y < lm[13].y && lm[16].y < lm[14].y },
        
        // 🌟 修復核心：深蹲！臀部跟膝蓋的 Y 軸差距，小於「身體長度的 50%」
        { name: "深蹲警戒 (Squat Mode)", check: (lm) => Math.abs(lm[23].y - Math.min(lm[25].y, lm[26].y)) < Math.abs(lm[11].y - lm[23].y) * 0.5 },
        
        // 🌟 修復核心：金雞獨立！兩邊膝蓋的高低差，大於「身體長度的 40%」
        { name: "金雞獨立 (Flamingo Stand)", check: (lm) => Math.abs(lm[25].y - lm[26].y) > Math.abs(lm[11].y - lm[23].y) * 0.4 }
    ];
    let currentPoseData = null;
    let currentPoseIndex = 0;

    function startGame() {
        flashLayer.classList.remove('system-start-flash'); void flashLayer.offsetWidth; flashLayer.classList.add('system-start-flash');
        startOverlay.classList.add('hidden'); resultOverlay.classList.add('hidden');
        totalScore = 0; currentStage = 1; updateScoreUI();
        loadStage(currentStage);
    }

    function updateScoreUI() { scoreText.innerText = totalScore; }

    function loadStage(stage) {
        isGameRunning = false; isTransitioning = true; 
        stageNumText.innerText = stage; timeLeft = 6000; updateTimerUI();
        
        currentPoseIndex = Math.floor(Math.random() * poses.length);
        currentPoseData = poses[currentPoseIndex];
        poseNameDisplay.innerText = currentPoseData.name;
        
        syncStatus.innerText = "擺出指定的動作！";
        syncStatus.style.color = "white";
        uiPanel.style.borderColor = "rgba(255, 255, 255, 0.15)";
        uiPanel.style.boxShadow = "0 8px 32px rgba(0, 0, 0, 0.5)";
        
        setTimeout(() => { isTransitioning = false; isGameRunning = true; startTimer(); }, 1500); 
    }

    function startTimer() {
        clearInterval(timerInterval);
        const startTime = Date.now();
        const totalDuration = timeLeft;
        timerInterval = setInterval(() => {
            if(!isGameRunning) return;
            const elapsed = Date.now() - startTime;
            timeLeft = totalDuration - elapsed;
            if (timeLeft <= 0) { timeLeft = 0; handleStageResult(false); }
            updateTimerUI();
        }, 50); 
    }

    function updateTimerUI() {
        timerText.innerText = (timeLeft / 1000).toFixed(1) + 's';
        const percentage = (timeLeft / 6000) * 100;
        timerBar.style.width = percentage + '%';
        timerBar.style.background = timeLeft < 2000 ? "var(--fail-glow)" : "var(--primary-glow)";
        timerBar.style.boxShadow = timeLeft < 2000 ? "0 0 10px var(--fail-glow)" : "0 0 10px var(--primary-glow)";
    }

    function handleStageResult(isSuccess) {
        isGameRunning = false; isTransitioning = true; clearInterval(timerInterval);
        if (isSuccess) {
            totalScore += 100;
            showFloatText("PERFECT!", "var(--success-glow)");
            uiPanel.style.borderColor = "var(--success-glow)";
            uiPanel.style.boxShadow = "0 0 30px var(--success-glow)";
            syncStatus.innerText = "SYNC COMPLETE!";
            syncStatus.style.color = "var(--success-glow)";
        } else {
            totalScore -= 50;
            showFloatText("TIME OUT", "var(--fail-glow)");
            uiPanel.style.borderColor = "var(--fail-glow)";
        }
        updateScoreUI();
        if (currentStage >= MAX_STAGES) {
            setTimeout(showFinalResult, 1000);
        } else {
            currentStage++; setTimeout(() => loadStage(currentStage), 800); 
        }
    }

    function showFloatText(msg, color) {
        floatText.innerText = msg; floatText.style.color = color; floatText.style.textShadow = `0 0 40px ${color}`;
        floatText.classList.remove('float-active'); void floatText.offsetWidth; floatText.classList.add('float-active');
        setTimeout(() => floatText.classList.remove('float-active'), 800);
    }

    function showFinalResult() {
        resultOverlay.classList.remove('hidden');
        let rank = totalScore === MAX_STAGES * 100 ? "<span style='color:#ffd700'>S 級：姿態之神！</span>" :
                   totalScore > 0 ? "<span style='color:#00ff88'>A 級：身手矯健！</span>" :
                   "<span style='color:#ff4444'>C 級：多做運動啦！</span>";
        document.getElementById('result-text').innerHTML = `TRAINING COMPLETE<br><br><span style="font-size: 32px; color: #a0aec0;">最終得分</span><br><span style="font-size: 80px; color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.8);">${totalScore}</span><br><br><span style="font-size: 24px;">${rank}</span>`;
    }

    // 🌟 全息替身視覺渲染器 (100% 對應 16 個動作)
    function drawHologramAvatar(ctx, poseIndex, isMatched) {
        const cx = canvasElement.width / 2;
        const cy = canvasElement.height / 2 + 50; 
        
        ctx.save();
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        
        const bodyColor = isMatched ? 'rgba(0, 255, 136, 0.5)' : 'rgba(0, 240, 255, 0.35)';
        const glowColor = isMatched ? 'rgba(0, 255, 136, 0.9)' : 'rgba(0, 240, 255, 0.9)';
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = isMatched ? 40 : 20;

        const drawCapsule = (x1, y1, x2, y2, thickness) => {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.lineWidth = thickness; ctx.strokeStyle = bodyColor; ctx.stroke();
            ctx.lineWidth = thickness * 0.25; ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.stroke();
        };

        const torsoTop = cy - 80; const torsoBot = cy + 60; const headY = torsoTop - 65;

        // 畫軀幹與頭部
        drawCapsule(cx, torsoTop, cx, torsoBot, 70); 
        ctx.beginPath(); ctx.arc(cx, headY, 40, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor; ctx.fill();
        ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.stroke();

        // 🌱 專屬彩蛋：頭頂小嫩葉
        ctx.beginPath();
        ctx.moveTo(cx, headY - 40);
        ctx.quadraticCurveTo(cx - 25, headY - 70, cx - 10, headY - 80);
        ctx.quadraticCurveTo(cx, headY - 60, cx, headY - 40);
        ctx.moveTo(cx, headY - 40);
        ctx.quadraticCurveTo(cx + 25, headY - 70, cx + 10, headY - 80);
        ctx.quadraticCurveTo(cx, headY - 60, cx, headY - 40);
        ctx.fillStyle = isMatched ? '#00ff88' : '#00ffaa';
        ctx.fill();

        ctx.shadowBlur = isMatched ? 40 : 20;

        // 預設的四肢坐標 (防呆待機)
        let la1 = [cx-35, torsoTop, cx-50, cy-10, 35]; let la2 = [cx-50, cy-10, cx-60, cy+60, 25];
        let ra1 = [cx+35, torsoTop, cx+50, cy-10, 35]; let ra2 = [cx+50, cy-10, cx+60, cy+60, 25];
        let ll1 = [cx-25, torsoBot, cx-35, cy+170, 40]; let ll2 = [cx-35, cy+170, cx-40, cy+260, 30];
        let rl1 = [cx+25, torsoBot, cx+35, cy+170, 40]; let rl2 = [cx+35, cy+170, cx+40, cy+260, 30];

        // 🌟 16 動作完美對應 Switch
        switch(poseIndex) {
            case 0: // V-Shape
                la1=[cx-35, torsoTop, cx-90, cy-150, 35]; la2=[cx-90, cy-150, cx-130, cy-230, 25];
                ra1=[cx+35, torsoTop, cx+90, cy-150, 35]; ra2=[cx+90, cy-150, cx+130, cy-230, 25]; break;
            case 1: // T-Pose
                la1=[cx-35, torsoTop, cx-120, torsoTop, 35]; la2=[cx-120, torsoTop, cx-190, torsoTop, 25];
                ra1=[cx+35, torsoTop, cx+120, torsoTop, 35]; ra2=[cx+120, torsoTop, cx+190, torsoTop, 25]; break;
            case 2: // One-Hand High
                la1=[cx-35, torsoTop, cx-90, cy-150, 35]; la2=[cx-90, cy-150, cx-110, cy-230, 25]; break;
            case 3: // Wakanda (交叉防禦)
                la1=[cx-35, torsoTop, cx-10, cy-30, 35]; la2=[cx-10, cy-30, cx+30, cy-60, 25];
                ra1=[cx+35, torsoTop, cx+10, cy-30, 35]; ra2=[cx+10, cy-30, cx-30, cy-60, 25]; break;
            case 4: // 雙手抱頭
                la1=[cx-35, torsoTop, cx-80, cy-120, 35]; la2=[cx-80, cy-120, cx-20, headY, 25];
                ra1=[cx+35, torsoTop, cx+80, cy-120, 35]; ra2=[cx+80, cy-120, cx+20, headY, 25]; break;
            case 5: // 雙手叉腰
                la1=[cx-35, torsoTop, cx-90, cy-20, 35]; la2=[cx-90, cy-20, cx-30, torsoBot, 25];
                ra1=[cx+35, torsoTop, cx+90, cy-20, 35]; ra2=[cx+90, cy-20, cx+30, torsoBot, 25]; break;
            case 6: // 投降姿勢
                la1=[cx-35, torsoTop, cx-110, torsoTop, 35]; la2=[cx-110, torsoTop, cx-110, cy-100, 25];
                ra1=[cx+35, torsoTop, cx+110, torsoTop, 35]; ra2=[cx+110, torsoTop, cx+110, cy-100, 25]; break;
            case 7: // 殭屍平舉
                la1=[cx-35, torsoTop, cx-35, cy-10, 35]; la2=[cx-35, cy-10, cx-35, cy+60, 25];
                ra1=[cx+35, torsoTop, cx+35, cy-10, 35]; ra2=[cx+35, cy-10, cx+35, cy+60, 25]; break;
            case 8: // Disco Time
                la1=[cx-35, torsoTop, cx-80, cy-150, 35]; la2=[cx-80, cy-150, cx-40, cy-220, 25];
                ra1=[cx+35, torsoTop, cx+10, cy-10, 35]; ra2=[cx+10, cy-10, cx-20, cy+60, 25]; break;
            case 9: // 芭蕾天鵝
                la1=[cx-35, torsoTop, cx-80, cy-150, 35]; la2=[cx-80, cy-150, cx, cy-200, 25];
                ra1=[cx+35, torsoTop, cx+80, cy-150, 35]; ra2=[cx+80, cy-150, cx, cy-200, 25]; break;
            case 10: // 龜派氣功
                la1=[cx-35, torsoTop, cx-80, cy-20, 35]; la2=[cx-80, cy-20, cx+40, cy-20, 25];
                ra1=[cx+35, torsoTop, cx+80, cy-20, 35]; ra2=[cx+80, cy-20, cx+40, cy-20, 25];
                ll1=[cx-25, torsoBot, cx-45, cy+150, 40]; ll2=[cx-45, cy+150, cx-50, cy+220, 30]; 
                rl1=[cx+25, torsoBot, cx+45, cy+150, 40]; rl2=[cx+45, cy+150, cx+50, cy+220, 30]; break;
            case 11: // 大字爆
                la1=[cx-35, torsoTop, cx-100, cy-120, 35]; la2=[cx-100, cy-120, cx-160, cy-180, 25];
                ra1=[cx+35, torsoTop, cx+100, cy-120, 35]; ra2=[cx+100, cy-120, cx+160, cy-180, 25];
                ll1=[cx-25, torsoBot, cx-80, cy+170, 40]; ll2=[cx-80, cy+170, cx-120, cy+260, 30]; 
                rl1=[cx+25, torsoBot, cx+80, cy+170, 40]; rl2=[cx+80, cy+170, cx+120, cy+260, 30]; break;
            case 12: // 祈禱
                la1=[cx-35, torsoTop, cx-20, cy-40, 35]; la2=[cx-20, cy-40, cx, cy-80, 25];
                ra1=[cx+35, torsoTop, cx+20, cy-40, 35]; ra2=[cx+20, cy-40, cx, cy-80, 25]; break;
            case 13: // 健美先生
                la1=[cx-35, torsoTop, cx-110, cy-60, 35]; la2=[cx-110, cy-60, cx-80, cy-130, 25];
                ra1=[cx+35, torsoTop, cx+110, cy-60, 35]; ra2=[cx+110, cy-60, cx+80, cy-130, 25]; break;
            case 14: // 深蹲
                la1=[cx-35, torsoTop, cx-60, cy-30, 35]; la2=[cx-60, cy-30, cx-40, cy+20, 25];
                ra1=[cx+35, torsoTop, cx+60, cy-30, 35]; ra2=[cx+60, cy-30, cx+40, cy+20, 25];
                ll1=[cx-25, torsoBot, cx-60, cy+140, 40]; ll2=[cx-60, cy+140, cx-40, cy+200, 30];
                rl1=[cx+25, torsoBot, cx+60, cy+140, 40]; rl2=[cx+60, cy+140, cx+40, cy+200, 30]; break;
            case 15: // 金雞獨立
                la1=[cx-35, torsoTop, cx-100, torsoTop, 35]; la2=[cx-100, torsoTop, cx-150, torsoTop, 25];
                ra1=[cx+35, torsoTop, cx+100, torsoTop, 35]; ra2=[cx+100, torsoTop, cx+150, torsoTop, 25];
                ll1=[cx-25, torsoBot, cx-35, cy+170, 40]; ll2=[cx-35, cy+170, cx-40, cy+260, 30]; 
                rl1=[cx+25, torsoBot, cx+80, cy+100, 40]; rl2=[cx+80, cy+100, cx+40, cy+180, 30]; break;
        }

        // 執行繪製
        drawCapsule(...la1); drawCapsule(...la2);
        drawCapsule(...ra1); drawCapsule(...ra2);
        drawCapsule(...ll1); drawCapsule(...ll2);
        drawCapsule(...rl1); drawCapsule(...rl2);

        ctx.restore();
    }

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        const w = canvasElement.width;
        const h = canvasElement.height;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, w, h);
        canvasCtx.drawImage(results.image, 0, 0, w, h);

        let isMatched = false;

        if (results.poseLandmarks && isGameRunning && !isTransitioning) {
            if (currentPoseData && currentPoseData.check(results.poseLandmarks)) {
                isMatched = true;
                handleStageResult(true); 
            }
        }

        if (currentPoseData) {
            drawHologramAvatar(canvasCtx, currentPoseIndex, isMatched);
        }

        if (results.poseLandmarks) {
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255, 255, 255, 0.4)', lineWidth: 3});
            drawLandmarks(canvasCtx, results.poseLandmarks, {color: 'white', fillColor: '#00f0ff', lineWidth: 1, radius: 4});
        }
        canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>

</body>
</html>
